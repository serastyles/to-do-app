<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head> 
<body>
    <h1>My Todo App</h1>
    <div class="input-container">
        <input type="text" id="taskInput" placeholder="Enter a new task">
        <button id="addBtn">Add Task</button>
        
        
    </div>
    <!-- Fetch tasks from fake API -->
    <button id="fetchData" style="margin-bottom: 10px; background-color: rgba(73, 220, 220, 0.753);">Fetch External Todos</button>

    <p id="taskCount">Total Tasks: 0</p>
    <p id="emptyMsg">No tasks to display yet.</p>
    <ul id="taskList"></ul>
    <button id="clearAllBtn">Clear All</button>
   
    


 <script src="index.js"></script>   
</body>
</html>
